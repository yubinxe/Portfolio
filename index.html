<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#1F2D6B",
  "pastels": [
    "#E9EBF3",
    "#E3ECE8",
    "#DCE6F2",
    "#E9E6F0",
    "#F0E7EA"
  ],
  "motion": "bouncy",
  "heroCase": "stacked"
}/*EDITMODE-END*/;

const PALETTES = {
  "Navy office": ["#E9EBF3", "#E3ECE8", "#DCE6F2", "#E9E6F0", "#F0E7EA"],
  "Slate mono":  ["#E8EAEF", "#E3E6EB", "#DDE2EA", "#E7E8ED", "#ECEAEC"],
  "Ink & steel": ["#DFE3EE", "#D8DEEA", "#D2DAEC", "#DDDCE8", "#E2DEE8"],
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent", t.accent);
    const p = t.pastels || PALETTES["Original pastels"];
    ["--butter", "--apple", "--sky", "--lilac", "--pink"].forEach((v, i) => r.style.setProperty(v, p[i]));
    document.body.classList.toggle("motion-calm", t.motion === "calm");
  }, [t.accent, t.pastels, t.motion]);

  const palName = Object.keys(PALETTES).find(k => JSON.stringify(PALETTES[k]) === JSON.stringify(t.pastels)) || "Original pastels";

  return (
    <div id="top">
      <Nav />
      <main>
        <Hero />
        <Marquee />
        <Composite />
        <Trajectory />
        <Artifacts />
        <Ledger />
        <About />
        <Contact />
      </main>

      <TweaksPanel>
        <TweakSection label="Palette" />
        <TweakSelect label="Pastel set" value={palName}
          options={Object.keys(PALETTES)}
          onChange={(v) => setTweak("pastels", PALETTES[v])} />
        <TweakColor label="Accent" value={t.accent}
          options={["#1F2D6B", "#111111", "#3A3631", "#7A5230", "#6A4E8C"]}
          onChange={(v) => setTweak("accent", v)} />
        <TweakSection label="Motion" />
        <TweakRadio label="Interaction" value={t.motion}
          options={["bouncy", "calm"]}
          onChange={(v) => setTweak("motion", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
/* ===== micro-interactions (오피스 모션 시스템) ===== */
(function () {
  var fine = window.matchMedia("(pointer: fine)").matches;
  var calm = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* scroll progress ink */
  var bar = document.createElement("div");
  bar.className = "scroll-ink";
  document.body.appendChild(bar);
  var ticking = false;
  window.addEventListener("scroll", function () {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(function () {
      var h = document.documentElement;
      var max = h.scrollHeight - h.clientHeight;
      bar.style.transform = "scaleX(" + (max > 0 ? h.scrollTop / max : 0) + ")";
      ticking = false;
    });
  }, { passive: true });

  /* smart nav — 내릴 땐 숨고 올릴 땐 나타남 */
  var lastY = 0;
  window.addEventListener("scroll", function () {
    var h = document.querySelector("header");
    if (!h) return;
    var y = window.scrollY;
    if (y > 340 && y - lastY > 6) h.classList.add("nav-hide");
    else if (lastY - y > 4 || y < 340) h.classList.remove("nav-hide");
    lastY = y;
  }, { passive: true });

  /* preloader — 잉크 커튼 (세션 1회) */
  try {
    if (!calm && !sessionStorage.getItem("yk_intro")) {
      sessionStorage.setItem("yk_intro", "1");
      var pre = document.createElement("div");
      pre.className = "preloader";
      pre.innerHTML = '<div class="preloader__mark"><div class="font-serif" style="font-weight:900;font-size:3.2rem;letter-spacing:-.02em">YK</div><div class="menu-rule" style="width:150px;margin:14px auto"><i></i></div><div class="eyebrow" style="letter-spacing:.3em;font-size:10px;opacity:.65">YUBIN KIM OFFICE</div></div>';
      document.body.appendChild(pre);
      setTimeout(function () { pre.classList.add("done"); setTimeout(function () { pre.remove(); }, 800); }, 950);
    }
  } catch (err) {}

  /* page fade transition */
  document.addEventListener("click", function (e) {
    var a = e.target.closest && e.target.closest('a[href$=".html"]');
    if (!a || a.target === "_blank" || e.metaKey || e.ctrlKey) return;
    e.preventDefault();
    document.body.classList.add("page-out");
    setTimeout(function () { location.href = a.getAttribute("href"); }, 240);
  });

  /* ink ripple on click */
  if (!calm) document.addEventListener("click", function (e) {
    var rp = document.createElement("span");
    rp.className = "ripple";
    rp.style.left = e.clientX + "px";
    rp.style.top = e.clientY + "px";
    document.body.appendChild(rp);
    setTimeout(function () { rp.remove(); }, 720);
  });

  /* React 마운트 대기 — scrollspy · rail · fill · count-up · hero exit · toast */
  var tries = 0;
  var timer = setInterval(function () {
    if (++tries > 80) return clearInterval(timer);
    if (!document.getElementById("manifesto")) return;
    clearInterval(timer);

    var spy = new IntersectionObserver(function (es) {
      es.forEach(function (en) {
        if (!en.isIntersecting) return;
        var links = document.querySelectorAll(".navlink");
        for (var i = 0; i < links.length; i++) {
          links[i].classList.toggle("active", links[i].getAttribute("href") === "#" + en.target.id);
        }
      });
    }, { rootMargin: "-38% 0px -55% 0px" });
    ["manifesto", "composite", "trajectory", "artifacts", "about", "contact"].forEach(function (id) {
      var s = document.getElementById(id);
      if (s) spy.observe(s);
    });

    var tl = document.querySelector(".timeline");
    var spine = document.querySelector(".timeline__spine");
    if (tl && spine) {
      var fill = document.createElement("div");
      fill.className = "timeline__fill";
      spine.appendChild(fill);
      var onTl = function () {
        var r = tl.getBoundingClientRect();
        var p = Math.min(1, Math.max(0, (innerHeight * 0.62 - r.top) / r.height));
        fill.style.height = (p * 100).toFixed(1) + "%";
      };
      window.addEventListener("scroll", onTl, { passive: true });
      onTl();
    }

    var ioC = new IntersectionObserver(function (es) {
      es.forEach(function (en) {
        if (!en.isIntersecting) return;
        ioC.unobserve(en.target);
        var el = en.target, n = parseInt(el.getAttribute("data-count"), 10) || 0, t0 = null;
        function step(ts) {
          if (!t0) t0 = ts;
          var p = Math.min(1, (ts - t0) / 1100);
          el.textContent = Math.round(n * p * (2 - p));
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      });
    }, { threshold: 0.5 });
    document.querySelectorAll("[data-count]").forEach(function (n) { ioC.observe(n); });

    var RAIL = [["manifesto", "선언"], ["composite", "역량"], ["trajectory", "궤적"], ["artifacts", "작업"], ["about", "소개"], ["contact", "연락"]];
    var rail = document.createElement("nav");
    rail.className = "rail";
    RAIL.forEach(function (r) {
      var a = document.createElement("a");
      a.href = "#" + r[0];
      a.setAttribute("data-label", r[1]);
      a.setAttribute("aria-label", r[1]);
      rail.appendChild(a);
    });
    document.body.appendChild(rail);
    var railSpy = new IntersectionObserver(function (es) {
      es.forEach(function (en) {
        if (!en.isIntersecting) return;
        rail.querySelectorAll("a").forEach(function (a) {
          a.classList.toggle("on", a.getAttribute("href") === "#" + en.target.id);
        });
      });
    }, { rootMargin: "-38% 0px -55% 0px" });
    RAIL.forEach(function (r) { var s = document.getElementById(r[0]); if (s) railSpy.observe(s); });

    if (!calm) {
      var heroWrap = document.querySelector("#manifesto .wrap");
      if (heroWrap) {
        window.addEventListener("scroll", function () {
          var y = window.scrollY;
          if (y > innerHeight * 1.2) return;
          var p = Math.min(1, y / (innerHeight * 0.9));
          heroWrap.style.opacity = (1 - p * 0.75).toFixed(3);
          heroWrap.style.transform = "translateY(" + (y * 0.16).toFixed(1) + "px) scale(" + (1 - p * 0.04).toFixed(4) + ")";
        }, { passive: true });
      }
    }

    var toast = document.createElement("div");
    toast.className = "toast font-ko";
    toast.textContent = "이메일 주소가 복사되었습니다 ✓";
    document.body.appendChild(toast);
    var cm = document.getElementById("copyMail");
    if (cm) cm.addEventListener("click", function () {
      navigator.clipboard.writeText("yubin120866@gmail.com").then(function () {
        toast.classList.add("on");
        setTimeout(function () { toast.classList.remove("on"); }, 1900);
      });
    });

    /* ===== 서울 라이브 시계 — 오피스 상태 ===== */
    var lh = document.querySelector(".letterhead");
    if (lh) {
      var cell = document.createElement("div");
      cell.style.textAlign = "left";
      cell.style.padding = "0 4px";
      cell.innerHTML = '<div style="font-weight:700;font-size:.98rem;display:flex;align-items:center;gap:7px"><span class="clock-dot"></span>SEOUL, KR</div><div style="font-size:.82rem;color:var(--ink-soft);opacity:.85"><span id="seoulClock">--:--:--</span> KST · <span id="officeState">—</span></div>';
      lh.appendChild(cell);
      var tick = function () {
        var now = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
        var p2 = function (n) { return String(n).padStart(2, "0"); };
        var el = document.getElementById("seoulClock");
        if (el) el.textContent = p2(now.getHours()) + ":" + p2(now.getMinutes()) + ":" + p2(now.getSeconds());
        var st = document.getElementById("officeState");
        if (st) st.textContent = (now.getHours() >= 9 && now.getHours() < 19) ? "OFFICE OPEN" : "AFTER HOURS";
      };
      tick();
      setInterval(tick, 1000);
    }

    /* ===== 태그라인 스크램블 디코드 ===== */
    if (!calm) {
      var tag = document.querySelector("#manifesto p.font-sans");
      if (tag) {
        var FIN = tag.textContent;
        var POOL = "ABCDEFGHIJKLMNOPQRSTUVWXYZ§·&/#";
        var t0 = null;
        var DUR = 1300;
        tag.style.minHeight = tag.offsetHeight + "px";
        function scr(ts) {
          if (!t0) t0 = ts;
          var p = Math.min(1, (ts - t0) / DUR);
          var reveal = Math.floor(FIN.length * p);
          var out = "";
          for (var i = 0; i < FIN.length; i++) {
            var ch = FIN[i];
            if (i < reveal || ch === " " || ch === ".") out += ch;
            else out += POOL[(Math.random() * POOL.length) | 0];
          }
          tag.textContent = out;
          if (p < 1) requestAnimationFrame(scr);
          else tag.textContent = FIN;
        }
        setTimeout(function () { requestAnimationFrame(scr); }, 500);
      }
    }

    /* ===== 히어로 파티클 성좌 캔버스 ===== */
    if (!calm) {
      var heroSec = document.getElementById("manifesto");
      var cv = document.createElement("canvas");
      cv.className = "hero-net";
      heroSec.appendChild(cv);
      var ctx = cv.getContext("2d");
      var W, H, pts = [];
      var mx = -9999, my = -9999;
      function sizeNet() {
        W = cv.width = heroSec.offsetWidth;
        H = cv.height = heroSec.offsetHeight;
        var n = Math.min(72, Math.floor(W / 22));
        pts = [];
        for (var i = 0; i < n; i++) {
          pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35, r: 1 + Math.random() * 1.6 });
        }
      }
      sizeNet();
      window.addEventListener("resize", sizeNet);
      if (fine) heroSec.addEventListener("mousemove", function (e) {
        var r = heroSec.getBoundingClientRect();
        mx = e.clientX - r.left; my = e.clientY - r.top;
      }, { passive: true });
      heroSec.addEventListener("mouseleave", function () { mx = my = -9999; });
      (function net() {
        requestAnimationFrame(net);
        if (document.hidden || window.scrollY > innerHeight * 1.25) return;
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < pts.length; i++) {
          var a = pts[i];
          a.x += a.vx; a.y += a.vy;
          if (a.x < 0 || a.x > W) a.vx *= -1;
          if (a.y < 0 || a.y > H) a.vy *= -1;
          var dxm = a.x - mx, dym = a.y - my;
          var dm = Math.sqrt(dxm * dxm + dym * dym);
          if (dm < 130 && dm > 0.1) { a.x += (dxm / dm) * 0.8; a.y += (dym / dm) * 0.8; }
          ctx.beginPath();
          ctx.arc(a.x, a.y, a.r, 0, 6.2832);
          ctx.fillStyle = "rgba(31,45,107,.5)";
          ctx.fill();
          for (var j = i + 1; j < pts.length; j++) {
            var b = pts[j];
            var dx = a.x - b.x, dy = a.y - b.y;
            var d2 = dx * dx + dy * dy;
            if (d2 < 15600) {
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = "rgba(31,45,107," + (0.16 * (1 - d2 / 15600)).toFixed(3) + ")";
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
        }
      })();
    }

    /* ===== 오로라 드리프트 ===== */
    if (!calm) {
      var au1 = document.createElement("div"); au1.className = "aurora aurora--a";
      var au2 = document.createElement("div"); au2.className = "aurora aurora--b";
      var hs = document.getElementById("manifesto");
      hs.insertBefore(au1, hs.firstChild);
      hs.insertBefore(au2, hs.firstChild);
    }
  }, 150);

  /* ---- 이하 포인터 전용 효과 ---- */
  if (!fine || calm) return;

  document.addEventListener("mousemove", function (e) {
    var card = e.target.closest && e.target.closest(".edition");
    if (!card) return;
    var r = card.getBoundingClientRect();
    var rx = ((e.clientY - r.top) / r.height - 0.5) * -4;
    var ry = ((e.clientX - r.left) / r.width - 0.5) * 4;
    card.style.transform = "translateY(-12px) scale(1.015) perspective(900px) rotateX(" + rx.toFixed(2) + "deg) rotateY(" + ry.toFixed(2) + "deg)";
  }, { passive: true });
  document.addEventListener("mouseout", function (e) {
    var card = e.target.closest && e.target.closest(".edition");
    if (card && !(e.relatedTarget && card.contains(e.relatedTarget))) card.style.transform = "";
  }, { passive: true });

  document.addEventListener("mousemove", function (e) {
    var hero = document.getElementById("manifesto");
    if (!hero) return;
    var r = hero.getBoundingClientRect();
    if (r.bottom < 0 || r.top > innerHeight) return;
    var dx = e.clientX / innerWidth - 0.5;
    var dy = e.clientY / innerHeight - 0.5;
    var st = hero.querySelectorAll(".sticker");
    for (var i = 0; i < st.length; i++) {
      var d = i % 2 ? 12 : 20;
      st[i].style.translate = (dx * d).toFixed(1) + "px " + (dy * d).toFixed(1) + "px";
    }
    var h1 = hero.querySelector("h1");
    if (h1) h1.style.transform = "perspective(950px) rotateX(" + (-dy * 4).toFixed(2) + "deg) rotateY(" + (dx * 4).toFixed(2) + "deg)";
  }, { passive: true });

  var dot = document.createElement("div"); dot.className = "cursor-dot";
  var ring = document.createElement("div"); ring.className = "cursor-ring";
  document.body.appendChild(dot); document.body.appendChild(ring);
  var cx = innerWidth / 2, cy = innerHeight / 2, rx2 = cx, ry2 = cy;
  document.addEventListener("mousemove", function (e) {
    cx = e.clientX; cy = e.clientY;
    dot.style.transform = "translate(" + cx + "px," + cy + "px) translate(-50%,-50%)";
  }, { passive: true });
  (function loop() {
    rx2 += (cx - rx2) * 0.16; ry2 += (cy - ry2) * 0.16;
    ring.style.transform = "translate(" + rx2 + "px," + ry2 + "px) translate(-50%,-50%)";
    requestAnimationFrame(loop);
  })();
  document.addEventListener("mouseover", function (e) {
    var t = e.target.closest && e.target.closest("a, button, .edition, .photo-card, .g-card, .stat-card");
    ring.classList.toggle("is-hover", !!t);
  }, { passive: true });

  document.addEventListener("mousemove", function (e) {
    var b = e.target.closest && e.target.closest(".btn");
    if (!b) return;
    var r = b.getBoundingClientRect();
    var mx = ((e.clientX - r.left) / r.width - 0.5) * 10;
    var my = ((e.clientY - r.top) / r.height - 0.5) * 8;
    b.style.translate = mx.toFixed(1) + "px " + my.toFixed(1) + "px";
  }, { passive: true });
  document.addEventListener("mouseout", function (e) {
    var b = e.target.closest && e.target.closest(".btn");
    if (b && !(e.relatedTarget && b.contains(e.relatedTarget))) b.style.translate = "";
  }, { passive: true });
})();
</script>
